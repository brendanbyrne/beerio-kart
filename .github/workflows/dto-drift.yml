name: DTO Drift

# Cheap backend ↔ frontend contract-drift detection (PR-H1, Issue #185).
#
# Fails a PR that changes a backend DTO / wire-contract file without also
# touching frontend/src/api/types.ts — the hand-maintained Zod mirror of the
# backend's serialized request/response types (ADR-0039: no Rust→TS codegen
# for MVP). False positives are acceptable: a backend change that does not
# alter the wire shape clears the check with a one-line touch to types.ts.
#
# The `paths:` list below enumerates the backend files that define serialized
# DTOs and the enums they reference; it MUST stay in sync with
# DTO_PATHS_REGEX in .github/scripts/dto-drift-check.sh. When you add a new
# DTO-bearing backend module, add it to BOTH. See
# docs/coding-standards/typescript.md § 11.
#
# NOTE: this is path-filtered, so a PR touching none of these files never runs
# it. That's fine while it's an advisory check. If it's ever made a *required*
# status check on `main`, the path filter would leave such PRs stuck "pending"
# (a skipped required check never reports) — at that point convert this to an
# always-runs job that internally checks the paths and exits 0 when none match.
on:
  pull_request:
    paths:
      - 'backend/src/routes/**'
      - 'backend/src/domain/enums.rs'
      - 'backend/src/services/auth.rs' # AccessClaims (decoded by AccessTokenPayloadSchema)
      - 'backend/src/services/sessions/types.rs'
      - 'backend/src/services/sessions/detail.rs'
      - 'backend/src/services/sessions/lifecycle.rs' # SessionSummary (GET /sessions)
      - 'backend/src/services/runs/read.rs'
      - 'backend/src/services/users.rs'
      - 'backend/src/services/notifications.rs'
      - 'frontend/src/api/types.ts'
      - '.github/workflows/dto-drift.yml'
      - '.github/scripts/dto-drift-check.sh'

concurrency:
  group: dto-drift-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift:
    name: Backend DTO ↔ frontend types sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the merge base of the PR branch is reachable for
          # the three-dot diff in the check script.
          fetch-depth: 0
          persist-credentials: false

      - name: Check DTO ↔ types.ts sync
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/dto-drift-check.sh
