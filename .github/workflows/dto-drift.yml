name: DTO Drift

# Cheap backend ↔ frontend contract-drift detection (PR-H1, Issue #185).
#
# Fails a PR that changes a backend DTO / wire-contract file without also
# touching frontend/src/api/types.ts — the hand-maintained Zod mirror of the
# backend's serialized request/response types (ADR-0039: no Rust→TS codegen
# for MVP). False positives are acceptable: a backend change that does not
# alter the wire shape clears the check with a one-line touch to types.ts.
#
# This workflow is NOT path-filtered: it runs on EVERY pull request and always
# posts a status, so it is safe to mark as a *required* check in branch
# protection (Issue #195). The path matching lives entirely inside
# dto-drift-check.sh (DTO_PATHS_REGEX) — when a PR touches no DTO file the
# script prints "nothing to check" and exits 0 (a real all-clear, not an
# absent status that would deadlock a required check at "Expected/Pending").
# When you add a DTO-bearing backend module, add it to that regex only; there
# is no longer a duplicate `paths:` list here to keep in sync. See
# docs/coding-standards/typescript.md § 11 and docs/branch-protection.md.
on:
  pull_request:

concurrency:
  group: dto-drift-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift:
    name: Backend DTO ↔ frontend types sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so the merge base of the PR branch is reachable for
          # the three-dot diff in the check script.
          fetch-depth: 0
          persist-credentials: false

      - name: Check DTO ↔ types.ts sync
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/dto-drift-check.sh
