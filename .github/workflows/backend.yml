name: Backend

# Backend coverage CI. PR runs are path-filtered to the backend subtree (PR-H2,
# Issue #193) so a frontend- or docs-only PR skips this workflow — the frontend
# has its own coverage workflow (frontend.yml), and Codecov's flag carryforward
# keeps the `backend` flag stable on the PRs that skip it.
#
# Pushes to `main` are deliberately NOT path-filtered (Issue #195): every commit
# on main uploads backend coverage, so Codecov always has a base report for the
# codecov/project/backend comparison. A docs-/frontend-only main commit would
# otherwise leave a base gap — the reason project status doesn't post today. A
# frontend-only PR's backend flag then carries forward from this base. See
# docs/branch-protection.md.
on:
  pull_request:
    paths:
      - 'backend/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'codecov.yml'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]

concurrency:
  group: backend-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # No explicit toolchain install: the stable toolchain is pinned in
      # rust-toolchain.toml (repo root) and auto-installs on first `cargo` use,
      # along with its llvm-tools-preview component (needed by cargo-llvm-cov).
      # This keeps coverage on the same rustc as the clippy gate and lefthook
      # (Issue #195; see docs/branch-protection.md).
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: .

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true
          flags: backend
