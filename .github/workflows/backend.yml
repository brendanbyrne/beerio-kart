name: Backend

# Backend coverage CI. Path-filtered to the backend subtree (PR-H2, Issue
# #193) so a frontend- or docs-only PR skips this workflow — the frontend has
# its own coverage workflow (frontend.yml). Codecov's flag carryforward keeps
# the `backend` flag stable on the PRs that skip it.
on:
  pull_request:
    paths:
      - 'backend/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'codecov.yml'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'codecov.yml'
      - '.github/workflows/backend.yml'

concurrency:
  group: backend-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # No explicit toolchain install: the stable toolchain is pinned in
      # rust-toolchain.toml (repo root) and auto-installs on first `cargo` use,
      # along with its llvm-tools-preview component (needed by cargo-llvm-cov).
      # This keeps coverage on the same rustc as the clippy gate and lefthook
      # (Issue #195; see docs/branch-protection.md).
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: .

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true
          flags: backend
