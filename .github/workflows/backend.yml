name: Backend

# Backend coverage CI. Path-filtered to the backend subtree (PR-H2, Issue
# #193) so a frontend- or docs-only PR skips this workflow — the frontend has
# its own coverage workflow (frontend.yml). Codecov's flag carryforward keeps
# the `backend` flag stable on the PRs that skip it.
on:
  pull_request:
    paths:
      - 'backend/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'codecov.yml'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'codecov.yml'
      - '.github/workflows/backend.yml'

concurrency:
  group: backend-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@15413b256f995d819248ea62704771a959284285 # v2.79.13
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: .

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true
          flags: backend
          # TEMPORARY workaround for codecov/codecov-action#1876: the uploader
          # intermittently fails to import Codecov's GPG verification key
          # ("gpg: Can't check signature: No public key"), failing the job even
          # though coverage generated fine. This started ~2026-06-13 (the job
          # passed on 06-12 with no change to our code or the action pin). Skip
          # the CLI signature check to ride out the Codecov-side outage; the
          # binary is still fetched over HTTPS from cli.codecov.io. REVERT this
          # once the key-import failures stop.
          skip_validation: true
