name: Frontend

# Frontend test + coverage CI (PR-H2, Issue #193). Path-filtered to the
# frontend subtree so a backend- or docs-only PR skips this workflow entirely
# (zero runner minutes). Codecov's flag carryforward keeps the `frontend` flag
# stable on the PRs that skip it.
#
# Seam with Issue #195 (general frontend-lint + backend-clippy CI): #195 should
# add its `bun run lint` / `bun run typecheck` jobs to THIS file — same path
# filter, same Bun setup. PR-H2 owns the `bun run test` + coverage job; #195
# must not duplicate it.
on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
      - 'codecov.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
      - 'codecov.yml'

concurrency:
  group: frontend-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          fail_ci_if_error: true
          flags: frontend
          # TEMPORARY workaround for codecov/codecov-action#1876: the uploader
          # intermittently fails to import Codecov's GPG verification key
          # ("gpg: Can't check signature: No public key"), failing the job even
          # though coverage generated fine. This started ~2026-06-13 (jobs
          # passed on 06-12 with no change to our code or the action pin). Skip
          # the CLI signature check to ride out the Codecov-side outage; the
          # binary is still fetched over HTTPS from cli.codecov.io. REVERT this
          # once the key-import failures stop. (Mirrors backend.yml.)
          skip_validation: true
