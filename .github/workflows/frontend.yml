name: Frontend

# Frontend test + coverage CI (PR-H2, Issue #193).
#
# Runs on EVERY pull request — deliberately NOT path-filtered (changed in Issue
# #195). The frontend suite is sub-second, and running it on every PR guarantees
# at least one coverage flag uploads on every commit, so Codecov always
# processes the commit and posts its `codecov/patch/{frontend,backend}` checks
# (the `backend` flag carries forward when backend.yml path-skips). Those checks
# are *required* in branch protection (docs/branch-protection.md); a docs-only
# PR that uploaded nothing at all could otherwise leave them with no status and
# deadlock the merge. backend.yml stays path-filtered because cargo llvm-cov is
# slow — its carryforward covers the skipped side.
#
# Issue #195's lint/typecheck jobs live in checks.yml, not here: they must run
# (and post a status) independently of any path filter — a different trigger
# shape from this coverage job. This workflow still owns the single
# `bun run test` + coverage upload; checks.yml must not duplicate it.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: frontend-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          fail_ci_if_error: true
          flags: frontend
