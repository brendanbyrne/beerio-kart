name: Checks

# Lint / typecheck / clippy / fmt safety-net (Issue #195).
#
# These mirror the lefthook pre-commit hooks (lefthook.yml), which are
# local-only and bypassable with `git commit --no-verify` or a contributor who
# never installed them. This workflow is the CI backstop.
#
# Unlike the coverage workflows (backend.yml / frontend.yml), this workflow is
# NOT path-filtered at the workflow level: it triggers on EVERY pull request so
# it ALWAYS posts a status. Each job then asks .github/scripts/detect-changes.sh
# whether its half of the repo actually changed and short-circuits to a green
# "nothing to check" pass when it didn't. That always-run + internal-skip shape
# is what makes these jobs safe to mark as *required* status checks in branch
# protection: a workflow that path-skips posts no status, and a required check
# with no status parks the PR at "Expected/Pending" forever (see Issue #195 and
# docs/branch-protection.md).
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: checks-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so the merge base of the PR branch is reachable for
          # detect-changes.sh's three-dot diff.
          fetch-depth: 0
          persist-credentials: false

      - id: changes
        name: Detect frontend changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: bash .github/scripts/detect-changes.sh frontend

      - if: steps.changes.outputs.run == 'true'
        name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - if: steps.changes.outputs.run == 'true'
        name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - if: steps.changes.outputs.run == 'true'
        name: Lint
        working-directory: frontend
        # `bun run lint` is `eslint .` — fails on ESLint *errors* only, not
        # warnings. Deliberately no `--max-warnings 0`: the frontend compliance
        # plan kept rules at `warn` until later PRs flipped them to `error`
        # (all now flipped as of PR-H1 / #185), and the warn-level strategy
        # relied on CI staying green on warnings. Errors are the gate.
        run: bun run lint

      - if: steps.changes.outputs.run == 'true'
        name: Typecheck
        working-directory: frontend
        # `bun run typecheck` is `tsc -b`. Not running `bun run build` (which is
        # `tsc -b && vite build`): the bundling step adds time without adding a
        # gate the team relies on — type errors are what we're catching here.
        run: bun run typecheck

  backend:
    name: Backend clippy & fmt
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: changes
        name: Detect backend changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: bash .github/scripts/detect-changes.sh backend

      # clippy runs on the stable toolchain pinned in rust-toolchain.toml (repo
      # root): bare `cargo clippy` honors that file — and so does lefthook
      # locally — so a new stable release can't surprise-break this required
      # check (Issue #195; see docs/branch-protection.md). The pinned toolchain
      # and its clippy component auto-install on first `cargo` use. fmt runs on
      # nightly because rustfmt.toml uses nightly-only options (imports_granularity,
      # group_imports) — the same reason lefthook calls `cargo +nightly fmt`;
      # nightly stays floating to match lefthook.
      - if: steps.changes.outputs.run == 'true'
        name: Install Rust nightly (rustfmt)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          components: rustfmt

      - if: steps.changes.outputs.run == 'true'
        name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: .

      - if: steps.changes.outputs.run == 'true'
        name: Clippy
        # Bare `cargo clippy` → the pinned stable from rust-toolchain.toml.
        # --all-targets so test code is compiled and linted too (the
        # #![warn(clippy::assertions_on_result_states)] in lib.rs only bites
        # when #[cfg(test)] modules compile — #217). Mirrors lefthook.
        run: cargo clippy --all-targets -- -D warnings

      - if: steps.changes.outputs.run == 'true'
        name: Format check
        run: cargo +nightly fmt --check
