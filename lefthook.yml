pre-commit:
  parallel: true
  commands:
    rust-fmt:
      root: backend/
      glob: "*.rs"
      run: cargo +nightly fmt --check
    rust-clippy:
      root: backend/
      glob: "*.rs"
      # --all-targets so clippy compiles (and lints) test code too: the
      # #![warn(clippy::assertions_on_result_states)] in lib.rs only bites
      # if the #[cfg(test)] modules are actually compiled (#217).
      run: cargo clippy --all-targets -- -D warnings
    frontend-lint:
      root: frontend/
      glob: "*.{ts,tsx}"
      run: bunx eslint {staged_files}
    frontend-format:
      root: frontend/
      glob: "*.{ts,tsx,css,json}"
      run: bunx prettier --check {staged_files}

pre-push:
  commands:
    # Frontend tests run pre-push, not pre-commit — too slow to gate every
    # commit (PR-H2, Issue #193). The `glob` skips this entirely when a push
    # touches no frontend source. The full suite runs (not `vitest --changed`):
    # lefthook can't hand vitest the push range reliably, and while the suite
    # is small a full run is sub-second and strictly more thorough. Revisit
    # `vitest related {push_files}` if the suite ever grows slow.
    frontend-test:
      root: frontend/
      glob: "*.{ts,tsx}"
      run: bun run test