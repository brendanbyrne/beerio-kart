# Codecov configuration
# Docs: https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    project:
      backend:
        flags: [backend]
        # Track base-branch coverage; don't regress, tolerate small noise.
        target: auto
        threshold: 0.5%
        informational: false  # blocking status check
      frontend:
        flags: [frontend]
        target: auto
        threshold: 0.5%
        # Reports a pass/fail status from PR-H1 (Issue #185) on (was
        # informational). PR-H2 (Issue #193) instrumented and un-ignored the
        # frontend while it was still largely untested, so it set this
        # informational to avoid a red X on every PR; PR-H1's coverage backfill
        # closed that gap. A project-coverage regression now shows X like
        # backend's — though that only *blocks merge* once `main` has a branch-
        # protection rule requiring these checks (none today). The frontend
        # *patch* status below has reported since PR-H2.
        informational: false  # pass/fail status check (not informational)
    patch:
      backend:
        flags: [backend]
        # New/changed code must be 80% covered.
        target: 80%
        threshold: 0%
        informational: false  # blocking status check
      frontend:
        flags: [frontend]
        target: 80%
        threshold: 0%
        informational: false  # blocking status check

# Per-flag scoping. carryforward keeps a flag's last-known coverage when its
# CI workflow is skipped — each coverage workflow is path-filtered to its own
# subtree, so a one-sided PR uploads only one flag.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: backend
      paths:
        - backend/
    - name: frontend
      paths:
        - frontend/

# Exclude generated/wiring code from coverage calculation. Frontend exclusions
# (test files, mocks, bootstrap) are applied at the Vitest layer
# (frontend/vitest.config.ts → coverage.exclude), so they never reach the lcov.
ignore:
  - "backend/src/entities/**"          # SeaORM-generated entities
  - "backend/migration/**"             # One-time startup migrations
  - "backend/src/main.rs"              # Server wiring
  - "backend/src/seed.rs"              # One-time seeding at startup

# Comment settings — what Codecov posts on PRs.
comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: true
